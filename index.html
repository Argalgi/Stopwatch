<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שעון עצר</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      direction: rtl;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #071724, #0f172a);
      color: #f8fafc;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 32px 20px 24px;
      box-sizing: border-box;
      min-height: 100vh;
    }

    #display {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 960px;
      font-size: clamp(4rem, 12vw, 10rem);
      letter-spacing: 0.14em;
      text-align: center;
      user-select: none;
      padding: 0 10px;
    }

    .controls {
      width: 100%;
      max-width: 960px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }

    button {
      flex: 1 1 180px;
      min-width: 150px;
      border: none;
      border-radius: 16px;
      padding: 18px 24px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .start {
      background: #22c55e;
      color: #08201d;
    }

    .stop {
      background: #ef4444;
      color: #ffffff;
    }

    .reset {
      background: rgba(148, 163, 184, 0.18);
      color: #e2e8f0;
      border: 1px solid rgba(226, 232, 240, 0.2);
    }
  </style>
</head>
<body>
  <div id="display">00:00:00</div>
  <div class="controls">
    <button id="startStop" class="start">הפעל</button>
    <button id="reset" class="reset">איפוס</button>
  </div>

  <script>
    const display = document.getElementById('display');
    const startStopBtn = document.getElementById('startStop');
    const resetBtn = document.getElementById('reset');

    let elapsedSeconds = 0;
    let timerId = null;
    let running = false;

    function formatTime(seconds) {
      const hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
      const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
      const secs = String(seconds % 60).padStart(2, '0');
      return `${hrs}:${mins}:${secs}`;
    }

    function updateDisplay() {
      display.textContent = formatTime(elapsedSeconds);
    }

    function startTimer() {
      timerId = setInterval(() => {
        elapsedSeconds += 1;
        updateDisplay();
      }, 1000);
      running = true;
      startStopBtn.textContent = 'עצור';
      startStopBtn.classList.remove('start');
      startStopBtn.classList.add('stop');
    }

    function stopTimer() {
      clearInterval(timerId);
      timerId = null;
      running = false;
      startStopBtn.textContent = 'המשך';
      startStopBtn.classList.remove('stop');
      startStopBtn.classList.add('start');
    }

    startStopBtn.addEventListener('click', () => {
      if (!running) {
        startTimer();
      } else {
        stopTimer();
      }
    });

    resetBtn.addEventListener('click', () => {
      clearInterval(timerId);
      timerId = null;
      elapsedSeconds = 0;
      running = false;
      updateDisplay();
      startStopBtn.textContent = 'הפעל';
      startStopBtn.classList.remove('stop');
      startStopBtn.classList.add('start');
    });
  </script>
</body>
</html>
